name: Django CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 bandit

      - name: Code Quality Check (flake8)
        run: flake8 . --exclude env,venv,__pycache__ || true

      - name: Security Scan (bandit)
        run: bandit -r . -x ./env,./venv || true

      - name: Django System Check
        run: python manage.py check


  cd:
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -e

            APP_DIR="/home/ubuntu/LBS"
            VENV_DIR="$APP_DIR/venv"

            if [ ! -d "$APP_DIR" ]; then
              echo "Deployment directory not found: $APP_DIR"
              exit 1
            fi

            cd "$APP_DIR"

            # Force sync with GitHub
            git fetch origin
            git reset --hard origin/main

            if [ ! -f ".env" ]; then
              echo "Missing $APP_DIR/.env on EC2"
              exit 1
            fi

            if [ ! -d "$VENV_DIR" ]; then
              python3 -m venv "$VENV_DIR"
            fi

            # Activate virtual environment
            . "$VENV_DIR/bin/activate"

            # Install dependencies
            pip install --upgrade pip
            pip install -r requirements.txt

            # Fail early if Django production settings are incomplete
            python manage.py check --deploy

            # Run migrations
            python manage.py migrate

            # Collect static files
            python manage.py collectstatic --noinput

            # Restart Gunicorn
            sudo systemctl restart gunicorn
            sudo systemctl status gunicorn --no-pager
