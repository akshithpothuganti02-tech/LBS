name: Django CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: django-cicd-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  APP_DIR: /home/ubuntu/LBS
  VENV_DIR: /home/ubuntu/LBS/venv

jobs:
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run flake8
        run: flake8 . --exclude env,venv,__pycache__,staticfiles

      - name: Run bandit
        run: bandit -r . -x ./env,./venv,./staticfiles

      - name: Run Django checks
        env:
          SECRET_KEY: ci-secret-key
          DEBUG: "False"
        run: |
          python manage.py check
          python manage.py makemigrations --check --dry-run

      - name: Run Django tests
        env:
          SECRET_KEY: ci-secret-key
          DEBUG: "False"
        run: python manage.py test

  cd:
    name: Continuous Deployment
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    timeout-minutes: 20
    environment:
      name: production

    steps:
      - name: Check SSH connectivity
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_PORT: ${{ secrets.EC2_PORT || '22' }}
        run: |
          if [ -z "$EC2_HOST" ]; then
            echo "EC2_HOST secret is not configured."
            exit 1
          fi

          echo "Checking TCP connectivity to $EC2_HOST:$EC2_PORT"
          timeout 10 bash -c "cat < /dev/null > /dev/tcp/$EC2_HOST/$EC2_PORT"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || '22' }}
          timeout: 60s
          command_timeout: 30m
          script_stop: true
          script: |
            set -Eeuo pipefail

            APP_DIR="${{ env.APP_DIR }}"
            VENV_DIR="${{ env.VENV_DIR }}"

            if [ ! -d "$APP_DIR" ]; then
              echo "Deployment directory not found: $APP_DIR"
              exit 1
            fi

            cd "$APP_DIR"

            if [ ! -d ".git" ]; then
              echo "Deployment directory is not a git repository: $APP_DIR"
              exit 1
            fi

            if [ ! -f ".env" ]; then
              echo "Missing $APP_DIR/.env on EC2"
              exit 1
            fi

            git fetch --depth=1 origin main
            git reset --hard FETCH_HEAD

            if [ ! -d "$VENV_DIR" ]; then
              python3 -m venv "$VENV_DIR"
            fi

            . "$VENV_DIR/bin/activate"

            python -m pip install --upgrade pip
            pip install -r requirements.txt

            python manage.py check --deploy
            python manage.py migrate --noinput
            python manage.py collectstatic --noinput

            sudo systemctl restart gunicorn
            sudo systemctl status gunicorn --no-pager
