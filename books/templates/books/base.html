<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Library Management System  {% endblock %}</title>
    <style>
        :root {
            --bg: #f5e6f5;
            --surface: rgba(255, 252, 247, 0.92);
            --surface-strong: #fffaf2;
            --card: #ffffff;
            --text: #1f2933;
            --muted: #6b7280;
            --line: rgba(126, 92, 58, 0.18);
            --brand: #9a3412;
            --brand-dark: #7c2d12;
            --accent: #14532d;
            --danger: #b42318;
            --shadow: 0 24px 60px rgba(93, 64, 38, 0.14);
            --radius-xl: 28px;
            --radius-lg: 20px;
            --radius-md: 14px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI Variable", "Trebuchet MS", "Gill Sans", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(251, 191, 36, 0.22), transparent 32%),
                radial-gradient(circle at top right, rgba(22, 163, 74, 0.12), transparent 28%),
                linear-gradient(180deg, #f7f2ea 0%, #efe6d8 100%);
        }

        .page-shell {
            width: min(1180px, calc(100% - 32px));
            margin: 32px auto;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            padding: 14px 18px;
            margin-bottom: 16px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 999px;
            background: rgba(255, 250, 242, 0.8);
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
        }

        .topbar-brand {
            font-weight: 800;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: var(--brand-dark);
            text-decoration: none;
        }

        .topbar-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            color: var(--muted);
            font-size: 0.95rem;
        }

        .hero {
            position: relative;
            overflow: hidden;
            padding: 32px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: var(--radius-xl);
            background: linear-gradient(135deg, rgba(255, 250, 242, 0.96), rgba(255, 245, 230, 0.9));
            box-shadow: var(--shadow);
        }

        .hero::after {
            content: "";
            position: absolute;
            inset: auto -80px -120px auto;
            width: 260px;
            height: 260px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(154, 52, 18, 0.16), transparent 65%);
        }

        .hero-top {
            display: flex;
            justify-content: space-between;
            gap: 24px;
            align-items: flex-start;
            flex-wrap: wrap;
        }

        .eyebrow {
            display: inline-flex;
            padding: 7px 12px;
            border-radius: 999px;
            background: rgba(154, 52, 18, 0.08);
            color: var(--brand-dark);
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        h1, h2, h3 {
            margin: 0;
            font-family: Georgia, "Times New Roman", serif;
            letter-spacing: -0.03em;
        }

        .hero h1 {
            margin-top: 14px;
            font-size: clamp(2rem, 4vw, 3.2rem);
            line-height: 1.05;
            max-width: 12ch;
        }

        .hero p {
            margin: 14px 0 0;
            max-width: 62ch;
            color: var(--muted);
            font-size: 1rem;
            line-height: 1.65;
        }

        .hero-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .content-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 22px;
            margin-top: 24px;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            backdrop-filter: blur(6px);
        }

        .panel-inner {
            padding: 24px;
        }

        .section-heading {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 18px;
        }

        .section-heading h2 {
            font-size: 1.6rem;
        }

        .section-heading p {
            margin: 6px 0 0;
            color: var(--muted);
        }

        .button,
        button,
        input[type="submit"] {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 44px;
            padding: 0 18px;
            border: 0;
            border-radius: 999px;
            font: inherit;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
            transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
        }

        .button:hover,
        button:hover,
        input[type="submit"]:hover {
            transform: translateY(-1px);
        }

        .button-primary,
        button,
        input[type="submit"] {
            color: #fff;
            background: linear-gradient(135deg, var(--brand), var(--brand-dark));
            box-shadow: 0 14px 28px rgba(154, 52, 18, 0.28);
        }

        .button-secondary {
            color: var(--text);
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid var(--line);
        }

        .button-danger {
            color: #fff;
            background: linear-gradient(135deg, #d92d20, #b42318);
            box-shadow: 0 14px 28px rgba(180, 35, 24, 0.22);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 14px;
            margin-top: 26px;
        }

        .stat-card {
            padding: 18px;
            border: 1px solid var(--line);
            border-radius: var(--radius-md);
            background: rgba(255, 255, 255, 0.72);
        }

        .stat-card span {
            display: block;
            font-size: 0.82rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.07em;
        }

        .stat-card strong {
            display: block;
            margin-top: 10px;
            font-size: 1.8rem;
            font-family: Georgia, "Times New Roman", serif;
        }

        .book-list,
        .record-list {
            display: grid;
            gap: 14px;
            padding: 0;
            margin: 0;
            list-style: none;
        }

        .book-card,
        .record-card {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 18px;
            padding: 18px;
            border: 1px solid var(--line);
            border-radius: var(--radius-md);
            background: var(--surface-strong);
        }

        .meta {
            color: var(--muted);
            line-height: 1.6;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .badge-success {
            color: var(--accent);
            background: rgba(20, 83, 45, 0.1);
        }

        .badge-warning {
            color: var(--brand-dark);
            background: rgba(154, 52, 18, 0.1);
        }

        .row-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .inline-form {
            margin: 0;
        }

        .inline-form button {
            min-height: 40px;
            padding: 0 16px;
        }

        .form-shell {
            max-width: 720px;
        }

        .form-grid {
            display: grid;
            gap: 18px;
        }

        .field-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .field-group input,
        .field-group select,
        .field-group textarea,
        input[type="text"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(126, 92, 58, 0.2);
            border-radius: 14px;
            background: #fffdf9;
            color: var(--text);
            font: inherit;
            outline: none;
            transition: border-color 0.18s ease, box-shadow 0.18s ease;
        }

        .field-group input:focus,
        .field-group select:focus,
        .field-group textarea:focus,
        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus,
        textarea:focus {
            border-color: rgba(154, 52, 18, 0.6);
            box-shadow: 0 0 0 4px rgba(154, 52, 18, 0.08);
        }

        .helper-text,
        .errorlist,
        .field-errors {
            margin: 8px 0 0;
            color: var(--danger);
            font-size: 0.92rem;
            line-height: 1.5;
            list-style: none;
            padding: 0;
        }

        .empty-state {
            padding: 24px;
            border: 1px dashed rgba(126, 92, 58, 0.28);
            border-radius: var(--radius-md);
            background: rgba(255, 255, 255, 0.55);
            color: var(--muted);
            text-align: center;
        }

        .danger-copy {
            margin: 0 0 18px;
            color: var(--muted);
            line-height: 1.7;
        }

        @media (max-width: 768px) {
            .page-shell {
                width: min(100% - 20px, 1180px);
                margin: 20px auto;
            }

            .hero,
            .panel-inner {
                padding: 22px;
            }

            .topbar {
                border-radius: 20px;
                padding: 14px;
            }

            .book-card,
            .record-card,
            .hero-top,
            .section-heading,
            .topbar {
                flex-direction: column;
                align-items: stretch;
            }

            .hero h1 {
                max-width: none;
            }
        }
    </style>
</head>
<body>
    <main class="page-shell">
        <header class="topbar">
            <a class="topbar-brand" href="{% url 'book_list' %}">
                Library Management
            </a>
            <div class="topbar-meta">
                <span>Organize books, borrowing, and returns in one place</span>
            </div>
        </header>
        {% block page %}{% endblock %}
    </main>
</body>
</html>
